name: Deploy Azure Functions ETL

on:
  push:
    branches: [main]
    paths:
      - "azure-functions/**"
      - "src/**"
      - ".github/workflows/deploy-azure-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build deployment package
        run: |
          mkdir -p deploy
          cp azure-functions/function_app.py deploy/
          cp azure-functions/host.json deploy/
          cp azure-functions/requirements.txt deploy/
          cp -r azure-functions/etl deploy/
          cp -r src deploy/

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTION_APP_NAME }}
          package: deploy
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true
